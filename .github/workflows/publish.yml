name: Publish to NPM

on:
  push:
    branches:
      - main
    paths:
      - 'expressio/**'
      - '.github/workflows/publish.yml'

jobs:
  lint-and-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: expressio

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run TypeScript linting
        run: bun run lint:ts

      - name: Publish to NPM
        run: bun run build && bun run npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}